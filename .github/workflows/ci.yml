name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned to the patched release: 1.26.4 fixes stdlib advisories GO-2026-5037
  # and GO-2026-5039 that the security job's govulncheck gate enforces.
  GO_VERSION: "1.26.4"

jobs:
  backend:
    name: Backend (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/**/go.sum

      - uses: arduino/setup-task@v2
        with:
          version: 3.51.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install golangci-lint (pinned via Taskfile)
        run: task tools:install:lint

      - name: Lint
        run: task backend:lint

      - name: Test (race detector)
        run: task backend:test

      - name: Build
        run: task backend:build

  security:
    name: Security (govulncheck, secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks scans the full history

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/**/go.sum

      - uses: arduino/setup-task@v2
        with:
          version: 3.51.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install govulncheck (pinned via Taskfile)
        run: task tools:install:security

      - name: Go vulnerability scan
        run: task backend:vuln

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image-scan:
    name: Image scan (Trivy, HIGH/CRITICAL fixable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build service images
        run: |
          docker build -t arena-gateway:scan -f backend/services/api-gateway/Dockerfile backend/
          docker build -t arena-executor:scan -f backend/services/executor/Dockerfile backend/

      # Run Trivy from its official image rather than the marketplace action:
      # the action's setup-trivy installer is flaky (binary download fails),
      # while the image carries the binary, so only the vuln DB is fetched.
      # Scope: OS packages only — Go module vulns are already gated by
      # govulncheck (the `security` job). Fails only on HIGH/CRITICAL that have
      # an available fix (ignore-unfixed).
      - name: Scan images (Trivy, OS packages)
        run: |
          mkdir -p "$HOME/.cache/trivy"
          scan() {
            echo "::group::trivy $1"
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "$HOME/.cache/trivy:/root/.cache/trivy" \
              aquasec/trivy:0.65.0 image \
              --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 \
              --pkg-types os --no-progress --scanners vuln "$1"
            echo "::endgroup::"
          }
          scan arena-gateway:scan
          scan arena-executor:scan

  proto:
    name: Protobuf (lint, generated-code drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/**/go.sum

      - uses: arduino/setup-task@v2
        with:
          version: 3.51.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install buf and protoc plugins (pinned via Taskfile)
        run: task tools:install:proto

      - name: Lint and format-check contracts
        run: task proto:lint

      - name: Verify committed generated code matches contracts
        run: |
          task proto:gen
          git diff --exit-code -- backend/pkg/pb || {
            echo "::error::Generated code is out of date. Run 'task proto:gen' and commit the result."
            exit 1
          }

  integration:
    name: Integration (sandbox + infra)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/**/go.sum

      - uses: arduino/setup-task@v2
        with:
          version: 3.51.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build sandbox images
        run: task executor:images

      - name: Run integration tests (executor sandbox + gateway Testcontainers)
        run: task backend:test:integration

  infra:
    name: Infra (helm lint, terraform validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Helm lint and render
        run: |
          helm lint infra/helm/arena
          helm template arena infra/helm/arena > /dev/null

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.6"

      - name: Terraform fmt and validate
        run: |
          terraform -chdir=infra/terraform/local init -backend=false
          terraform -chdir=infra/terraform/local fmt -check
          terraform -chdir=infra/terraform/local validate

  k8s-smoke:
    name: K8s smoke (judged submission inside Kind)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build service images
        run: |
          docker build -t arena-gateway:dev -f backend/services/api-gateway/Dockerfile backend/
          docker build -t arena-executor:dev -f backend/services/executor/Dockerfile backend/

      - uses: helm/kind-action@v1
        with:
          cluster_name: arena
          config: infra/k8s/kind-config.yaml

      - name: Load service images into the cluster
        run: kind load docker-image arena-gateway:dev arena-executor:dev --name arena

      - name: Deploy (includes in-cluster sandbox image builds)
        run: helm upgrade --install arena infra/helm/arena --wait --timeout 20m

      - name: Smoke — submission judged accepted in-cluster
        run: bash scripts/k8s-smoke.sh

      - name: Diagnostics
        if: failure()
        run: |
          kubectl get pods -A -o wide
          kubectl get events --sort-by=.lastTimestamp | tail -50
          kubectl logs -l app.kubernetes.io/name=gateway --tail=100 || true
          kubectl logs -l app.kubernetes.io/name=executor -c executor --tail=100 || true
          kubectl logs -l app.kubernetes.io/name=executor -c dind --tail=50 || true

  e2e:
    name: E2E (full stack, Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/**/go.sum

      - uses: arduino/setup-task@v2
        with:
          version: 3.51.1
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build sandbox images
        run: task executor:images

      - name: Start infrastructure and seed demo data
        run: |
          task infra:up
          task db:seed

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E suite (Playwright boots executor, gateway, frontend)
        working-directory: frontend
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

  frontend:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies (fail on high/critical in production deps)
        run: pnpm audit --prod --audit-level high

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
