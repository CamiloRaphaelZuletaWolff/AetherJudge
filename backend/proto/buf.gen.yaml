version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/caezu/arena/backend/pkg/pb
plugins:
  - local: protoc-gen-go
    out: ../pkg/pb
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: ../pkg/pb
    opt: paths=source_relative
