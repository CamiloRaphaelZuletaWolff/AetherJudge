# Prometheus config for the COMPOSE shape: the services run natively on the
# host (task gateway:run / executor:run), so scraping goes through
# host.docker.internal. The Kubernetes flavor is templated in the Helm chart
# (templates/observability.yaml) because it needs release-prefixed DNS names.
global:
  scrape_interval: 5s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: arena-gateway
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: arena-executor
    static_configs:
      - targets: ["host.docker.internal:9101"]
