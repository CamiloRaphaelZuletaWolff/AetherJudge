# Tempo single-binary config, shared by both deploy shapes. Traces arrive
# over OTLP gRPC (:4317) and live on local disk with a short retention —
# this is a dev/debugging store, not an archive.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

compactor:
  compaction:
    block_retention: 24h
