{{- if .Values.seed.enabled }}
# Seeds the demo contest and demo accounts after every install/upgrade.
# Idempotent by construction (the seeder upserts). Disable via
# --set seed.enabled=false for anything resembling a real deployment.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-seed
  labels:
    {{- include "arena.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seed
        {{- include "arena.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: seed
          image: "{{ .Values.gateway.image }}:{{ .Values.gateway.tag }}"
          command: ["/seed"]
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: DATABASE_URL
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          resources:
            requests: { cpu: 50m, memory: 32Mi }
            limits: { cpu: 500m, memory: 128Mi }
{{- end }}
