apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    {{- include "arena.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: {{ .Values.gateway.nodePort }}
---
# Metrics get their own HEADLESS Service: keeping 9100 off the NodePort
# Service means operational internals never leave the cluster, and headless
# DNS resolves to every gateway pod so Prometheus DNS-SD scrapes each replica.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway-metrics
  labels:
    {{- include "arena.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway
  labels:
    {{- include "arena.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- include "arena.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        # distroless:nonroot ships uid 65532.
        runAsUser: 65532
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image }}:{{ .Values.gateway.tag }}"
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: JWT_SECRET
            # Web tier: 0 by default so the dedicated worker deployment owns
            # judging (set >0 to also judge in-process, e.g. single-node dev).
            - name: JUDGE_WORKERS
              value: {{ .Values.gateway.judgeWorkers | quote }}
            # Unique consumer-group identity per pod.
            - name: CONSUMER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.observability.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo:4317
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9100
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          # Startup runs migrations (session-locked) before listening; give
          # it room on a cold database.
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 2
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            periodSeconds: 5
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
