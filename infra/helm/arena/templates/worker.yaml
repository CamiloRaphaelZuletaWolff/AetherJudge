{{- if .Values.worker.enabled }}
# The judge-worker deployment (ADR-0011): consumers of the durable Redis
# queue, scaled independently of the HTTP gateway. Same image as the gateway
# (one image, three entrypoints: /server, /seed, /worker); this runs /worker,
# which serves no public HTTP — only an internal /metrics listener.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-worker-metrics
  labels:
    {{- include "arena.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: worker
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    {{- include "arena.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- include "arena.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: worker
          image: "{{ .Values.gateway.image }}:{{ .Values.gateway.tag }}"
          command: ["/worker"]
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: JWT_SECRET
            - name: JUDGE_WORKERS
              value: {{ .Values.worker.judgeWorkers | quote }}
            - name: CONSUMER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.observability.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo:4317
            {{- end }}
          ports:
            - name: metrics
              containerPort: 9100
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          # The worker's only listener is /metrics; use it for health.
          startupProbe:
            httpGet:
              path: /metrics
              port: 9100
            periodSeconds: 2
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9100
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9100
            periodSeconds: 5
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
{{- end }}
